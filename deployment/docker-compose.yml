services:
  # Redis — managed by Docker Desktop
  redis:
    image: redis:7
    ports: ["6379:6379"]

  # Postgres — managed by Docker Desktop
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quotes
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8001 --reload
    ports: ["8001:8001"]
    env_file: [../backend/.env]
    volumes:
      - ../backend/app:/app/app
      - ../backend/data:/app/data
    depends_on: [redis, postgres]

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker.tasks worker --loglevel=info
    env_file: [../backend/.env]
    volumes:
      - ../backend/app:/app/app
      - ../backend/data:/app/data
    depends_on: [redis, postgres]

volumes:
  pgdata:
